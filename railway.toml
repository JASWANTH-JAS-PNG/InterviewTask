[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "cp .env.example .env && php artisan key:generate --force && php artisan package:discover --ansi && php artisan config:clear && php artisan migrate --seed --force && php artisan storage:link --force && php artisan serve --host=0.0.0.0 --port=$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
