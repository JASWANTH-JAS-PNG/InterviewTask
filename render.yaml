services:
  - type: web
    name: bloghub
    env: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: bloghub-db
          property: connectionString
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: array
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      # Set APP_URL to your Render service URL after first deploy, e.g. https://bloghub.onrender.com
      - key: APP_URL
        sync: false

databases:
  - name: bloghub-db
    databaseName: blog_management
    user: blog_user
